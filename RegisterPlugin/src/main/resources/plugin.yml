name: RegisterPlugin
version: '${project.version}'
main: kr.plugin.register.RegisterPlugin
api-version: '1.20'
description: 회원가입 및 이름 변경 시스템
author: YourName
softdepend:
  - TAB

commands:
  회원가입:
    description: 서버 회원가입을 합니다.
    usage: /회원가입 <이름>
    aliases:
      - register
      - reg
  이름변경:
    description: 서버 내 이름을 변경합니다.
    usage: /이름변경 <새이름>
    aliases:
      - rename
      - changename

permissions:
  registerplugin.admin:
    description: 관리자 권한
    default: op
  registerplugin.register:
    description: 회원가입 권한
    default: true
  registerplugin.rename:
    description: 이름 변경 권한
    default: true
