name: Build RegisterPlugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub 서버에서 우분투 실행

    steps:
      - uses: actions/checkout@v4          # 코드 가져오기

      - uses: actions/setup-java@v4        # JDK 17 설치
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -q          # 빌드 실행

      - uses: actions/upload-artifact@v4   # JAR 저장
        with:
          name: RegisterPlugin-jar
          path: target/RegisterPlugin-*.jar
